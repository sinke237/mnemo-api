name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Job 1: Lint & Format ────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: pip install ruff black

      - name: Run ruff (linter)
        run: ruff check src/ tests/

      - name: Run black (formatter check)
        run: black --check src/ tests/

  # ── Job 2: Type Check ───────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mypy
        run: mypy src/mnemo/ --exclude src/mnemo/db/redis.py

  # ── Job 3: Tests ────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mnemo_test
          POSTGRES_USER: mnemo
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://mnemo:test_password@localhost:5432/mnemo_test
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: development
      JWT_SECRET_KEY: test_secret_key_that_is_long_enough_for_tests_only
      PYTHONPATH: src

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run database migrations
        run: |
          # Only run if there are migration files (phases after Phase 0 will have them)
          if ls alembic/versions/*.py 2>/dev/null | grep -q .; then
            alembic upgrade head
          else
            echo "No migrations yet — skipping"
          fi

      - name: Run tests
        run: pytest tests/ -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Job 4: Build Docker image ───────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mnemo-api:ci .

      - name: Verify health endpoint exists in image
        run: |
          docker run --rm -d \
            -e DATABASE_URL="postgresql+asyncpg://x:x@localhost/x" \
            -e REDIS_URL="redis://localhost:6379/0" \
            -e APP_ENV="development" \
            -e JWT_SECRET_KEY="test_secret_key_that_is_long_enough_ok" \
            -p 8000:8000 \
            --name mnemo_ci \
            mnemo-api:ci &
          sleep 5
          # Just verify the container started (DB won't be available in this check)
          docker ps | grep mnemo_ci
          docker stop mnemo_ci || true

  # ── Job 5: Flutter CI ───────────────────────────────────────────────────────
  flutter-ci:
    name: Flutter CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apiapp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Android (APK)
        run: flutter build apk --debug

      - name: Build iOS
        run: flutter build ios --no-codesign

      - name: Build Web
        run: flutter build web